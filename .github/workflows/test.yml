name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout eyerate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: eyerate

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read

      - name: Checkout matika (sibling — required by test suite)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: manomatika/matika
          path: matika
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: |
          uv venv .venv --python python3.14
          # Use matika's exact locked deps (not just >=minimums) to avoid
          # version drift that can surface deprecation warnings from transitive
          # packages like starlette. Strip the "-e ." self-install line since
          # matika is imported via PYTHONPATH, not as an installed package here.
          uv export --directory matika --frozen --no-hashes --no-dev \
            | grep -v "^-e " > /tmp/matika-locked.txt
          uv pip install --python .venv/bin/python -r /tmp/matika-locked.txt
          uv pip install --python .venv/bin/python -r eyerate/pyproject.toml
          uv pip install --python .venv/bin/python pytest pytest-asyncio

      - name: Run pytest
        working-directory: eyerate
        env:
          PYTHONPATH: src:../matika/src
          SECRET_KEY: test-only-secret-key-not-for-production
        run: ../.venv/bin/python -m pytest tests/ -v
