name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout eyerate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: eyerate

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read

      - name: Checkout matika (sibling — required by test suite)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: manomatika/matika
          path: matika
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      # Build the combined env and run the full suite through the ONE canonical
      # runner that local development also uses (scripts/run-tests.sh). The script
      # is the single declared source for the three-layer install (matika locked
      # deps + eyerate runtime deps + eyerate dev group) and sets PYTHONPATH and
      # SECRET_KEY itself, so the config CI runs is the config developers run.
      - name: Run test suite
        working-directory: eyerate
        run: ./scripts/run-tests.sh -v
