name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/release-notes/${TAG}.md"
          if [ -f "${NOTES_FILE}" ]; then
            gh release create "${TAG}" \
              --title "EyeRate ${TAG}" \
              --notes-file "${NOTES_FILE}"
          else
            gh release create "${TAG}" \
              --title "EyeRate ${TAG}" \
              --notes "## EyeRate ${TAG}"$'\n\n'"No release notes file found for this tag."
          fi
